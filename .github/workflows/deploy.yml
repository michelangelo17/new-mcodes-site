name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Scaleway: providers (object storage, registry, container) + the S3 state
      # backend. The backend reads the AWS_* names, so we point those at the
      # Scaleway keys too.
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORG_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}

      # Real AWS creds for the Route 53 provider, passed as tofu vars so they
      # don't collide with the backend's AWS_* env above.
      TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_route53_zone_id: ${{ secrets.ROUTE53_ZONE_ID }}

      REGISTRY: rg.fr-par.scw.cloud
      IMAGE_NAME: ${{ secrets.SCW_REGISTRY_NS }}/mcodes-mcp
      SITE_BUCKET: ${{ secrets.SITE_BUCKET }}
      SCW_S3_ENDPOINT: https://s3.fr-par.scw.cloud

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
      - name: tofu init
        run: tofu init
        working-directory: infra

      # The registry namespace must exist before we can push the image, but
      # it's created by tofu — so apply just that resource first.
      - name: Ensure registry namespace
        run: tofu apply -auto-approve -target=scaleway_registry_namespace.mcp -var "container_image=placeholder"
        working-directory: infra

      # --- build + push the MCP server image ---
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # --- provision / update all infra (container now points at the image) ---
      - name: tofu apply
        run: tofu apply -auto-approve -var "container_image=${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}"
        working-directory: infra

      # --- build + sync the static site into the bucket ---
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build + sync site
        run: ./scripts/deploy-site.sh

      # --- invalidate CloudFront so new HTML shows immediately ---
      - name: Get CloudFront distribution id
        id: cf
        working-directory: infra
        run: echo "id=$(tofu output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
      - name: Invalidate CloudFront
        # Real AWS creds here (the job-level AWS_* are the Scaleway keys, which
        # would point this at the wrong account).
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.cf.outputs.id }}" --paths "/*"
