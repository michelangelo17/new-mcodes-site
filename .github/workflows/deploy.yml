name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Scaleway: providers, registry, S3 state backend (via -backend-config at init).
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORG_ID }}

      TF_VAR_route53_zone_id: ${{ secrets.ROUTE53_ZONE_ID }}

      REGISTRY: rg.fr-par.scw.cloud
      IMAGE_NAME: ${{ secrets.SCW_REGISTRY_NS }}/mcodes-mcp
      SITE_BUCKET: ${{ secrets.SITE_BUCKET }}
      SCW_S3_ENDPOINT: https://s3.fr-par.scw.cloud

    steps:
      - uses: actions/checkout@v4

      # Assume the AWS deploy role via OIDC — no long-lived AWS keys anywhere.
      # Sets AWS_ACCESS_KEY_ID/SECRET/SESSION_TOKEN in env for subsequent steps.
      - name: AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: opentofu/setup-opentofu@v1
      - name: tofu init
        working-directory: infra
        # Scaleway creds passed explicitly (the AWS_* env above is real AWS).
        run: |
          tofu init \
            -backend-config="access_key=${SCW_ACCESS_KEY}" \
            -backend-config="secret_key=${SCW_SECRET_KEY}"

      - name: Ensure registry namespace
        working-directory: infra
        run: tofu apply -auto-approve -target=scaleway_registry_namespace.mcp -var "container_image=placeholder"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: tofu apply
        working-directory: infra
        run: tofu apply -auto-approve -var "container_image=${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build + sync site
        # deploy-site.sh maps SCW_* onto AWS_* internally so the aws CLI hits
        # Scaleway, not real AWS. No env override needed here.
        run: ./scripts/deploy-site.sh

      - name: Get CloudFront distribution id
        id: cf
        working-directory: infra
        run: echo "id=$(tofu output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
      - name: Invalidate CloudFront
        # AWS_* here is the OIDC-issued real-AWS temp creds.
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.cf.outputs.id }}" --paths "/*"
